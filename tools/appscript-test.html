<!doctype html>
<html lang="ko">
<head><meta charset="utf-8"><title>Apps Script 연결 테스트</title>
<style>
 body{font-family:system-ui,"Noto Sans KR",sans-serif;max-width:680px;margin:40px auto;padding:0 20px;line-height:1.6}
 input{font:inherit;padding:8px;width:100%;box-sizing:border-box;margin:6px 0 14px}
 button{font:inherit;padding:8px 16px;cursor:pointer}
 pre{background:#f5f5f5;padding:12px;border-radius:8px;white-space:pre-wrap;word-break:break-all;min-height:40px}
 .muted{color:#666;font-size:14px}
</style></head>
<body>
<h2>Apps Script 연결 테스트</h2>
<p class="muted">이 파일을 더블클릭해서 열고 아래 버튼을 누르세요. 대시보드/Pages와 무관하게 웹앱만 직접 확인합니다.</p>

<label>웹앱 URL</label>
<input id="url" value="https://script.google.com/macros/s/AKfycbxLe29K4JPLcPHXPQkCANWGCPo9cj41RSMauJllC48c0AhB1AMlgcUgC4iFicNOiMUp1A/exec">

<button id="ping">1) 연결 테스트 (쓰기 안 함)</button>
<p class="muted">정상이면 결과에 <code>{"ok":false,"error":"unauthorized"}</code> 가 떠야 합니다. 그러면 배포·권한·JSONP가 모두 정상이라는 뜻입니다.</p>

<label>관리자 비밀번호 (선택, 입력 시 "쓰기"까지 테스트 — 시트가 갱신됩니다)</label>
<input id="pw" placeholder="비워두면 연결만 테스트">
<button id="write">2) 비밀번호로 쓰기 테스트 (주의: 시트 덮어씀)</button>

<h3>결과</h3>
<pre id="out">아직 실행 안 함</pre>

<script>
function out(s){ document.getElementById('out').textContent = s; }
function jsonp(payloadObj, label){
  out(label + ' … 호출 중');
  var cb = 'cbtest' + Date.now();
  var done = false;
  var t = setTimeout(function(){ if(done) return; done=true; cleanup();
    out('응답 없음(타임아웃 15초). → 배포 접근권한이 "모든 사용자"인지, 새 버전으로 배포했는지 확인하세요.'); }, 15000);
  var s;
  window[cb] = function(res){ if(done) return; done=true; clearTimeout(t); cleanup();
    out(label + ' 결과:\n' + JSON.stringify(res, null, 2)); };
  function cleanup(){ try{ delete window[cb]; }catch(e){} if(s&&s.parentNode) s.parentNode.removeChild(s); }
  var url = document.getElementById('url').value.trim()
    + '?callback=' + cb + '&payload=' + encodeURIComponent(JSON.stringify(payloadObj));
  s = document.createElement('script');
  s.src = url;
  s.onerror = function(){ if(done) return; done=true; clearTimeout(t); cleanup();
    out('스크립트 로드 실패. → URL이 맞는지, 배포 접근권한이 "모든 사용자"인지 확인하세요.'); };
  document.head.appendChild(s);
}
document.getElementById('ping').onclick = function(){ jsonp({}, '연결 테스트'); };
document.getElementById('write').onclick = function(){
  var pw = document.getElementById('pw').value;
  jsonp({ password: pw, tasks: [], checklist: [] }, '쓰기 테스트');
};
</script>
</body></html>
